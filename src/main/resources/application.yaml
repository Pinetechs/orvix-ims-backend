spring:
  application:
    name: orvix-ims
  datasource:
    username: root
    password: root
  jpa:
    hibernate:
     # ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

server:
  port: 8080

orvix:
  jwt:
    secret: change-this-secret-before-production
    expiration-ms: 86400000
